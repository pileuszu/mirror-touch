name: Build and Release macOS Host and iOS Client

on:
  push:
    tags:
      - 'v*' # Trigger workflow when a version tag (e.g. v1.0.0) is pushed

permissions:
  contents: write # Required to create release and upload assets

jobs:
  build-and-release:
    runs-on: macos-14 # macOS 14 Apple Silicon runner
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable' # Automatically selects the latest Xcode 16+ on the runner

      - name: Build macOS Host
        run: |
          # Compile the macOS host bypassing the code signing requirement on GHA runner
          xcodebuild -project macOS-Host/macOS-Host.xcodeproj \
                     -scheme macOS-Host \
                     -configuration Release \
                     -derivedDataPath build_mac \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     -quiet

      - name: Package macOS Application
        run: |
          cd build_mac/Build/Products/Release
          zip -r ../../../../macOS-Host.zip macOS-Host.app

      - name: Build iOS Client (Unsigned IPA)
        run: |
          # Compile the iOS client as an unsigned archive (bypass signing code restriction)
          xcodebuild -project iOS-Client/iOS-Client/iOS-Client.xcodeproj \
                     -scheme iOS-Client \
                     -sdk iphoneos \
                     -configuration Release \
                     -archivePath build_ios/iOS-Client.xcarchive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     -quiet \
                     clean archive
          
          # Package the .app into a standard Payload folder to create a valid .ipa file
          mkdir -p Payload
          cp -R build_ios/iOS-Client.xcarchive/Products/Applications/iOS-Client.app Payload/
          zip -r iOS-Client.ipa Payload

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            macOS-Host.zip
            iOS-Client.ipa
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
