name: Build and Release macOS Host

on:
  push:
    tags:
      - 'v*' # Trigger workflow when a version tag (e.g. v1.0.0) is pushed

permissions:
  contents: write # Required to create release and upload assets

jobs:
  build-and-release:
    runs-on: macos-14 # macOS 14 Apple Silicon runner
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build macOS Host
        run: |
          xcodebuild -project macOS-Host/macOS-Host.xcodeproj \
                     -scheme macOS-Host \
                     -configuration Release \
                     -derivedDataPath build \
                     -quiet

      - name: Package Application Bundle
        run: |
          # Package the standalone macOS-Host.app into a ZIP archive for distribution
          cd build/Build/Products/Release
          zip -r ../../../../macOS-Host.zip macOS-Host.app

      - name: Create GitHub Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: macOS-Host.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
